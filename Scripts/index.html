<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Info</title>
  </head>
  <body>
    <script>
      // Paste your real Tavily key here (it starts with "tvly-").
      const TAVILY_API_KEY = "";

      // The Gallery calls THIS exact global. Do not rename it.
      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          // data is a stringified JSON, e.g. '{"query":"today\'s news"}'
          let payload;
          try {
            payload = JSON.parse(data);
          } catch (e) {
            payload = { query: String(data) };
          }
          const query = (payload && payload.query) || "latest news";

          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 15000);

          const response = await fetch("https://api.tavily.com/search", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + TAVILY_API_KEY,
            },
            body: JSON.stringify({
              query: query,
              search_depth: "basic",
              include_answer: true,
              max_results: 5,
            }),
            signal: controller.signal,
          });

          clearTimeout(timeout);

          if (!response.ok) {
            return JSON.stringify({ error: "Tavily returned HTTP " + response.status });
          }

          const data2 = await response.json();

          if (!data2.results || data2.results.length === 0) {
            return JSON.stringify({ result: "No live web results found for: " + query });
          }

          let output = "";
          if (data2.answer) output += "Summary:\n" + data2.answer + "\n\n";
          output += "Sources:\n\n";
          data2.results.forEach((item, i) => {
            output += (i + 1) + ". " + (item.title || "Untitled") + "\n" + (item.url || "") + "\n\n";
          });

          return JSON.stringify({ result: output });
        } catch (err) {
          // A CORS block usually arrives here as "Failed to fetch".
          return JSON.stringify({ error: err.message });
        }
      };
    </script>
  </body>
</html>
